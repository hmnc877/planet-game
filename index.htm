<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>超重力惑星ゲーム</title>
<style>
*{box-sizing:border-box}
body{margin:0;background:#050816;overflow:hidden;font-family:sans-serif}
#container{position:fixed;inset:0}
canvas{width:100vw;height:100dvh;display:block;background:linear-gradient(#02030a,#0b1030)}

#ui{
  position:absolute;top:10px;left:10px;color:white;
  background:rgba(0,0,0,0.5);padding:10px 12px;border-radius:12px;
  border:1px solid rgba(255,255,255,0.1);min-width:110px;
}
#score{font-size:15px;font-weight:bold;margin-bottom:2px}
#highscore{font-size:11px;color:#aaa;margin-bottom:6px}
#next{font-size:12px;color:#ccc}
#preview{width:45px;height:45px;border-radius:50%;margin-top:5px;border:2px solid white;background-size:cover}

#combo-display{
  position:absolute;top:10px;left:50%;transform:translateX(-50%);
  color:#ffcc00;font-size:28px;font-weight:bold;
  text-shadow:0 0 10px rgba(255,200,0,0.8);
  pointer-events:none;opacity:0;transition:opacity 0.3s;
}

#soundBtn{position:absolute;top:10px;right:10px;font-size:24px;cursor:pointer;user-select:none}

#difficulty{position:absolute;bottom:10px;right:10px;color:rgba(255,255,255,0.4);font-size:11px}

/* タイトル画面 */
#title-screen{
  position:fixed;inset:0;background:linear-gradient(135deg,#02030a,#0b1030,#150830);
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  z-index:100;
}
#title-screen h1{
  color:white;font-size:clamp(28px,6vw,52px);margin:0 0 8px;
  text-shadow:0 0 30px rgba(100,100,255,0.8);letter-spacing:2px;
}
#title-screen .sub{color:#88aaff;font-size:clamp(12px,3vw,18px);margin-bottom:40px}
#title-screen .hi{color:#ffcc00;font-size:14px;margin-bottom:30px}
#startBtn{
  background:linear-gradient(135deg,#3344cc,#6644ff);
  color:white;border:none;padding:16px 48px;font-size:20px;
  border-radius:50px;cursor:pointer;
  box-shadow:0 0 30px rgba(100,100,255,0.5);
  transition:transform 0.1s,box-shadow 0.1s;
}
#startBtn:hover{transform:scale(1.05);box-shadow:0 0 40px rgba(100,100,255,0.7)}
#startBtn:active{transform:scale(0.97)}
.title-planets{position:absolute;inset:0;pointer-events:none;overflow:hidden}
.title-planet{position:absolute;border-radius:50%;opacity:0.15;animation:float linear infinite}
@keyframes float{0%{transform:translateY(100vh) rotate(0deg)}100%{transform:translateY(-200px) rotate(360deg)}}

/* ゲームオーバー画面 */
#gameover-screen{
  position:fixed;inset:0;background:rgba(0,0,0,0.85);
  display:none;flex-direction:column;align-items:center;justify-content:center;
  z-index:100;
}
#gameover-screen h2{color:white;font-size:clamp(28px,6vw,48px);margin:0 0 20px}
#go-score{color:#ffcc00;font-size:clamp(20px,5vw,36px);margin-bottom:8px}
#go-best{color:#aaa;font-size:16px;margin-bottom:40px}
#retryBtn{
  background:linear-gradient(135deg,#cc3344,#ff4466);
  color:white;border:none;padding:14px 44px;font-size:18px;
  border-radius:50px;cursor:pointer;
  box-shadow:0 0 20px rgba(255,50,80,0.4);
  transition:transform 0.1s;
}
#retryBtn:hover{transform:scale(1.05)}
#retryBtn:active{transform:scale(0.97)}
</style>
</head>
<body>

<!-- タイトル画面 -->
<div id="title-screen">
  <div class="title-planets" id="titlePlanets"></div>
  <h1>🪐 超重力惑星</h1>
  <div class="sub">天体を合体させて宇宙最大の星を目指せ！</div>
  <div class="hi" id="title-hi"></div>
  <button id="startBtn">ゲームスタート</button>
</div>

<!-- ゲームオーバー画面 -->
<div id="gameover-screen">
  <h2>💥 ゲームオーバー</h2>
  <div id="go-score"></div>
  <div id="go-best"></div>
  <button id="retryBtn">もう一度プレイ</button>
</div>

<div id="container" style="display:none">
  <div id="ui">
    <div id="score">Score: 0</div>
    <div id="highscore">Best: 0</div>
    <div id="next">次:</div>
    <div id="preview"></div>
  </div>
  <div id="combo-display"></div>
  <div id="soundBtn">🔊</div>
  <div id="difficulty"></div>
  <canvas id="game"></canvas>
</div>

<script>
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");

function resizeGame(){
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
}
resizeGame();
window.addEventListener("resize", resizeGame);

const GAMEOVER_LINE = 180;

const planets = [
 {name:"地球", r:28, img:"assets/earth.png"},
 {name:"海王星", r:34, img:"assets/neptune.png"},
 {name:"土星", r:42, img:"assets/saturn.png"},
 {name:"木星", r:52, img:"assets/jupiter.png"},
 {name:"太陽", r:64, img:"assets/sun.png"},
 {name:"シリウス", r:72, img:"assets/sirius.png"},
 {name:"ピストルスター", r:82, img:"assets/pistol_star.png"},
 {name:"UYスクティ", r:95, img:"assets/uy_scuti.png"}
];

const images = planets.map(p=>{
 const img = new Image();
 img.src = p.img;
 return img;
});

// ---- 状態変数 ----
let balls=[], nextType=0, score=0;
let explosions=[], countdowns=[], bonusTexts=[], scoreParticles=[], particles=[];
let soundOn=true;
let blackHole=null, blackHoleTriggered=false, nextBlackHoleScore=100000, blackHoleWaiting=false;
let gameRunning=false, gameOver=false;
let mouseX=canvas.width/2, mouseOnCanvas=false;
let shakeAmt=0;
let comboCount=0, comboTimer=null;
let startTime=0;
let highScore=parseInt(localStorage.getItem("planetHS")||"0");

const bgm = new Audio("assets/bgm.wav");
bgm.loop=true; bgm.volume=0.4;

// ---- タイトル画面装飾 ----
(function setupTitlePlanets(){
  const container=document.getElementById("titlePlanets");
  const colors=["#4466ff","#ff6644","#44ffaa","#ffcc00","#cc44ff"];
  for(let i=0;i<8;i++){
    const d=document.createElement("div");
    const size=30+Math.random()*80;
    d.className="title-planet";
    d.style.cssText=`width:${size}px;height:${size}px;background:${colors[i%colors.length]};
      left:${Math.random()*100}%;animation-duration:${8+Math.random()*12}s;
      animation-delay:${-Math.random()*12}s;`;
    container.appendChild(d);
  }
  const hi=localStorage.getItem("planetHS");
  if(hi && parseInt(hi)>0){
    document.getElementById("title-hi").textContent="ハイスコア: "+parseInt(hi).toLocaleString();
  }
})();

document.getElementById("startBtn").addEventListener("click",startGame);
document.getElementById("retryBtn").addEventListener("click",()=>{
  document.getElementById("gameover-screen").style.display="none";
  startGame();
});

function startGame(){
  document.getElementById("title-screen").style.display="none";
  document.getElementById("container").style.display="block";

  balls=[]; explosions=[]; countdowns=[]; bonusTexts=[]; scoreParticles=[]; particles=[];
  score=0; comboCount=0; shakeAmt=0;
  blackHole=null; blackHoleTriggered=false; nextBlackHoleScore=100000; blackHoleWaiting=false;
  gameOver=false; gameRunning=true;
  startTime=Date.now();
  nextType=Math.floor(Math.random()*3);

  updateUI();
  if(soundOn) bgm.play().catch(()=>{});
  requestAnimationFrame(loop);
}

// ---- ハイスコア ----
function saveHighScore(){
  if(score>highScore){
    highScore=score;
    localStorage.setItem("planetHS",highScore);
  }
}

function updateUI(){
 document.getElementById("score").innerText="Score: "+score.toLocaleString();
 document.getElementById("highscore").innerText="Best: "+highScore.toLocaleString();
 document.getElementById("next").innerText="次: "+planets[nextType].name;
 document.getElementById("preview").style.backgroundImage=`url(${planets[nextType].img})`;

 const elapsed=Math.floor((Date.now()-startTime)/1000);
 const lvl=Math.floor(elapsed/30)+1;
 document.getElementById("difficulty").textContent=`Lv.${lvl} ${elapsed}s`;
}

// ---- Ball ----
class Ball{
 constructor(x,y,type){
  this.x=x; this.y=y; this.type=type;
  this.r=planets[type].r;
  this.vx=(Math.random()-0.5)*0.6;
  this.vy=0; this.dead=false;
  this.justDropped=true;
  this.settled=false;
  this.settleTimer=60;
 }

 update(gravity){
  this.vy+=gravity;
  this.x+=this.vx;
  this.y+=this.vy;
  this.vx*=0.99;
  this.vy*=0.995;

  if(this.x-this.r<0){this.x=this.r;this.vx*=-0.3;}
  if(this.x+this.r>canvas.width){this.x=canvas.width-this.r;this.vx*=-0.3;}
  if(this.y+this.r>canvas.height){this.y=canvas.height-this.r;this.vy*=-0.2;}

  if(this.settleTimer>0) this.settleTimer--;
  else this.justDropped=false;
 }

 draw(){
  const img=images[this.type];
  ctx.save();
  ctx.translate(this.x,this.y);
  ctx.beginPath();
  ctx.arc(0,0,this.r,0,Math.PI*2);
  ctx.clip();
  ctx.drawImage(img,-this.r,-this.r,this.r*2,this.r*2);
  ctx.restore();
 }
}

// ---- UYスクティ爆発 ----
function triggerUYScuti(ball){
  countdowns.push({ball,start:Date.now()});
  setTimeout(()=>{
    if(ball.dead) return;
    for(let i=0;i<4;i++){
      explosions.push({
        x:ball.x, y:ball.y,
        start:Date.now()+i*120,
        color:["255,100,0","255,220,0","255,60,60","200,100,255"][i]
      });
    }
    shakeAmt=18;
    score+=1000;
    ball.dead=true;
    bonusTexts.push({text:"UYスクティ 大爆発！ +1000",x:canvas.width/2,y:canvas.height/2,start:Date.now()});
    updateUI();
  },3000);
}

// ---- コンボ ----
function addCombo(){
  comboCount++;
  if(comboTimer) clearTimeout(comboTimer);
  comboTimer=setTimeout(()=>{comboCount=0;updateComboDisplay();},1200);

  if(comboCount>=2){
    const bonus=comboCount*50;
    score+=bonus;
    updateComboDisplay();
    bonusTexts.push({
      text:`${comboCount} COMBO! +${bonus}`,
      x:canvas.width/2, y:canvas.height*0.4,
      start:Date.now(), color:"rgba(255,220,50,"
    });
  }
  updateUI();
}

function updateComboDisplay(){
  const el=document.getElementById("combo-display");
  if(comboCount>=2){
    el.textContent=`${comboCount} COMBO!`;
    el.style.opacity="1";
  } else {
    el.style.opacity="0";
  }
}

// ---- パーティクル ----
function spawnParticles(x,y,color){
  for(let i=0;i<14;i++){
    const angle=Math.random()*Math.PI*2;
    const speed=2+Math.random()*5;
    particles.push({
      x,y,
      vx:Math.cos(angle)*speed,
      vy:Math.sin(angle)*speed,
      r:2+Math.random()*4,
      life:1,
      decay:0.025+Math.random()*0.025,
      color
    });
  }
}

// ---- ドロップ ----
function drop(x){
  if(!gameRunning||gameOver) return;
  const newBall=new Ball(x,80,nextType);
  balls.push(newBall);
  if(newBall.type===planets.length-1) triggerUYScuti(newBall);
  nextType=Math.floor(Math.random()*3);
  updateUI();
}

// ---- マウス追跡 ----
canvas.addEventListener("mousemove",e=>{
  const r=canvas.getBoundingClientRect();
  mouseX=(e.clientX-r.left)*(canvas.width/r.width);
  mouseOnCanvas=true;
});
canvas.addEventListener("mouseleave",()=>{mouseOnCanvas=false;});

function getX(e){
 const r=canvas.getBoundingClientRect();
 return (e.clientX-r.left)*(canvas.width/r.width);
}

document.getElementById("soundBtn").addEventListener("click",()=>{
  soundOn=!soundOn;
  document.getElementById("soundBtn").textContent=soundOn?"🔊":"🔇";
  if(soundOn) bgm.play(); else bgm.pause();
});

canvas.addEventListener("click",async e=>{
  if(soundOn&&bgm.paused){try{await bgm.play();}catch(err){}}
  if(blackHoleWaiting){blackHoleWaiting=false;return;}
  drop(getX(e));
});

canvas.addEventListener("touchstart",e=>{
  e.preventDefault();
  if(soundOn&&bgm.paused) bgm.play().catch(()=>{});
  if(blackHoleWaiting){blackHoleWaiting=false;return;}
  const t=e.touches[0];
  const r=canvas.getBoundingClientRect();
  mouseX=(t.clientX-r.left)*(canvas.width/r.width);
  drop(mouseX);
},{passive:false});

canvas.addEventListener("touchmove",e=>{
  e.preventDefault();
  const t=e.touches[0];
  const r=canvas.getBoundingClientRect();
  mouseX=(t.clientX-r.left)*(canvas.width/r.width);
  mouseOnCanvas=true;
},{passive:false});

// ---- 合体 ----
function merge(){
 for(let i=0;i<balls.length;i++){
 for(let j=i+1;j<balls.length;j++){
  const a=balls[i], b=balls[j];
  const dx=a.x-b.x, dy=a.y-b.y;
  const dist=Math.sqrt(dx*dx+dy*dy);
  const min=a.r+b.r;

  if(dist<min){
   const angle=Math.atan2(dy,dx);
   const overlap=(min-dist)*0.5;
   a.x+=Math.cos(angle)*overlap;
   a.y+=Math.sin(angle)*overlap;
   b.x-=Math.cos(angle)*overlap;
   b.y-=Math.sin(angle)*overlap;

   if(a.type===b.type){
    const mx=(a.x+b.x)/2, my=(a.y+b.y)/2;
    balls.splice(j,1);
    balls.splice(i,1);
    const newType=a.type+1;
    if(newType>=planets.length){
      spawnParticles(mx,my,"255,180,0");
      shakeAmt=6;
      score+=(a.type+1)*10;
      addCombo();
      return;
    }
    const merged=new Ball(mx,my,newType);
    balls.push(merged);
    if(newType===planets.length-1) triggerUYScuti(merged);

    // パーティクル色はタイプによって変える
    const colors=["100,200,255","255,180,100","200,255,100","255,100,200","255,220,50","200,100,255","100,255,200","255,100,50"];
    spawnParticles(mx,my,colors[a.type%colors.length]);
    shakeAmt=Math.max(shakeAmt,4+newType*0.8);

    score+=(a.type+1)*10;
    addCombo();
    return;
   }
  }
 }
 }
}

// ---- ゲームオーバー判定 ----
function checkGameOver(){
  if(gameOver) return;
  for(const b of balls){
    if(!b.justDropped && b.y-b.r < GAMEOVER_LINE){
      triggerGameOver();
      return;
    }
  }
}

function triggerGameOver(){
  gameOver=true;
  gameRunning=false;
  saveHighScore();
  bgm.pause();

  setTimeout(()=>{
    const go=document.getElementById("gameover-screen");
    document.getElementById("go-score").textContent="スコア: "+score.toLocaleString();
    const isNew=score>=highScore&&score>0;
    document.getElementById("go-best").textContent=isNew
      ? "🎉 NEW RECORD! "+highScore.toLocaleString()
      : "ベスト: "+highScore.toLocaleString();
    go.style.display="flex";
  },600);
}

// ---- 描画 ----
function drawLine(){
 ctx.strokeStyle="rgba(255,80,80,0.7)";
 ctx.lineWidth=2;
 ctx.setLineDash([12,8]);
 ctx.beginPath();
 ctx.moveTo(0,GAMEOVER_LINE);
 ctx.lineTo(canvas.width,GAMEOVER_LINE);
 ctx.stroke();
 ctx.setLineDash([]);

 ctx.fillStyle="rgba(255,80,80,0.5)";
 ctx.font="11px sans-serif";
 ctx.textAlign="left";
 ctx.fillText("GAME OVER LINE",8,GAMEOVER_LINE-5);
}

function drawGuide(){
  if(!mouseOnCanvas||gameOver) return;
  const mx=Math.max(0,Math.min(canvas.width,mouseX));
  ctx.save();
  ctx.strokeStyle="rgba(255,255,255,0.25)";
  ctx.lineWidth=1.5;
  ctx.setLineDash([8,8]);
  ctx.beginPath();
  ctx.moveTo(mx,GAMEOVER_LINE);
  ctx.lineTo(mx,canvas.height);
  ctx.stroke();
  ctx.setLineDash([]);

  // 次に落とす天体プレビュー（半透明）
  const img=images[nextType];
  const pr=planets[nextType].r;
  ctx.globalAlpha=0.35;
  ctx.beginPath();
  ctx.arc(mx,GAMEOVER_LINE+pr+4,pr,0,Math.PI*2);
  ctx.clip();
  ctx.drawImage(img,mx-pr,GAMEOVER_LINE+4,pr*2,pr*2);
  ctx.restore();
}

function drawParticles(){
  particles.forEach(p=>{
    p.x+=p.vx; p.y+=p.vy;
    p.vy+=0.1;
    p.life-=p.decay;
    if(p.life<=0) return;
    ctx.save();
    ctx.globalAlpha=p.life;
    ctx.fillStyle=`rgb(${p.color})`;
    ctx.beginPath();
    ctx.arc(p.x,p.y,p.r*p.life,0,Math.PI*2);
    ctx.fill();
    ctx.restore();
  });
  particles=particles.filter(p=>p.life>0);
}

function drawEffects(){
  explosions.forEach(e=>{
    const age=Date.now()-e.start;
    if(age<0||age>1200) return;
    const alpha=1-age/1200;
    const r=age*0.7;
    const col=e.color||"255,180,0";
    ctx.beginPath();
    ctx.arc(e.x,e.y,r,0,Math.PI*2);
    ctx.strokeStyle=`rgba(${col},${alpha})`;
    ctx.lineWidth=18;
    ctx.stroke();
    ctx.beginPath();
    ctx.arc(e.x,e.y,r*0.5,0,Math.PI*2);
    ctx.strokeStyle=`rgba(255,255,255,${alpha*0.6})`;
    ctx.lineWidth=8;
    ctx.stroke();
  });
  explosions=explosions.filter(e=>{const age=Date.now()-e.start;return age>=0&&age<1200;});

  countdowns.forEach(c=>{
    if(c.ball.dead) return;
    const remain=3-Math.floor((Date.now()-c.start)/1000);
    if(remain<=0) return;
    ctx.fillStyle="white";
    ctx.font="bold 60px sans-serif";
    ctx.textAlign="center";
    ctx.fillText(remain,c.ball.x,c.ball.y+20);
  });
  countdowns=countdowns.filter(c=>!c.ball.dead);

  if(blackHole){
    blackHole.r+=blackHoleWaiting?0:(blackHole.r<100?3:12);
    ctx.beginPath();
    ctx.arc(blackHole.x,blackHole.y,blackHole.r,0,Math.PI*2);
    ctx.fillStyle="black";
    ctx.fill();
    ctx.strokeStyle="purple";
    ctx.lineWidth=8;
    ctx.stroke();
    if(blackHoleWaiting){
      ctx.fillStyle="white";
      ctx.font="bold 40px sans-serif";
      ctx.textAlign="center";
      ctx.fillText("ブラックホール出現！",canvas.width/2,120);
      ctx.fillStyle="yellow";
      ctx.fillText("タップして起動！",canvas.width/2,180);
    }
    if(blackHole.r>canvas.width){
      explosions.push({x:blackHole.x,y:blackHole.y,start:Date.now()});
      balls.forEach(b=>b.dead=true);
      score+=5000;
      shakeAmt=25;
      bonusTexts.push({text:"BLACK HOLE BONUS +5000!",x:canvas.width/2,y:canvas.height/2,start:Date.now()});
      scoreParticles.push({start:Date.now()});
      nextBlackHoleScore=score+100000;
      blackHole=null; blackHoleTriggered=false;
      updateUI();
    }
  }

  bonusTexts.forEach(t=>{
    const age=Date.now()-t.start;
    if(age>1800) return;
    const alpha=1-age/1800;
    ctx.save();
    ctx.textAlign="center";
    ctx.textBaseline="middle";
    let fontSize=56;
    ctx.font=`bold ${fontSize}px sans-serif`;
    while(ctx.measureText(t.text).width>canvas.width*0.88){fontSize-=4;ctx.font=`bold ${fontSize}px sans-serif`;}
    ctx.fillStyle=`rgba(255,220,0,${alpha})`;
    ctx.shadowColor="rgba(255,150,0,0.8)";
    ctx.shadowBlur=20;
    ctx.fillText(t.text,canvas.width/2,t.y-age*0.04);
    ctx.restore();
  });
  bonusTexts=bonusTexts.filter(t=>Date.now()-t.start<1800);

  scoreParticles.forEach(p=>{
    const age=Date.now()-p.start;
    const t=Math.min(age/800,1);
    const x=canvas.width/2+(80-canvas.width/2)*t;
    const y=canvas.height/2+(30-canvas.height/2)*t;
    ctx.save();
    ctx.globalAlpha=1-t;
    ctx.translate(x,y);
    ctx.scale(1-t,1-t);
    ctx.fillStyle="yellow";
    ctx.font="bold 40px sans-serif";
    ctx.textAlign="center";
    ctx.textBaseline="middle";
    ctx.fillText("+5000",0,0);
    ctx.restore();
  });
  scoreParticles=scoreParticles.filter(p=>Date.now()-p.start<800);
}

// ---- メインループ ----
function loop(){
  if(!gameRunning&&!gameOver) return;

  // 難易度：30秒ごとに重力増加
  const elapsed=(Date.now()-startTime)/1000;
  const gravity=0.22+Math.floor(elapsed/30)*0.015;

  // 画面シェイク
  if(shakeAmt>0.1){
    ctx.save();
    const sx=(Math.random()-0.5)*shakeAmt;
    const sy=(Math.random()-0.5)*shakeAmt;
    ctx.translate(sx,sy);
    shakeAmt*=0.82;
  }

  ctx.clearRect(-50,-50,canvas.width+100,canvas.height+100);
  drawLine();
  drawGuide();

  balls.forEach(b=>{b.update(gravity);b.draw();});

  merge();
  checkGameOver();

  if(!gameOver && score>=nextBlackHoleScore && !blackHoleTriggered){
    blackHoleTriggered=true;
    blackHole={x:canvas.width/2,y:canvas.height/2,r:40,start:Date.now()};
    blackHoleWaiting=true;
    document.body.style.background="white";
    setTimeout(()=>document.body.style.background="#050816",100);
  }

  drawParticles();
  drawEffects();

  if(shakeAmt>0.1) ctx.restore();

  balls=balls.filter(b=>!b.dead);

  if(elapsed%30<0.1) updateUI();

  requestAnimationFrame(loop);
}
</script>
</body>
</html>
